# Fallback — unknown host → main domain
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 301 http://se-art.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 195.209.216.109;

    return 301 http://se-art.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name se-art.ru www.se-art.ru;

    root /var/www/sergievskaya;
    index index.html;

    client_max_body_size 12M;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location ~ ^/admin/?(.*)$ {
        return 301 http://irwkc.se-art.ru/$1$is_args$args;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /vk/ {
        root /var/www/sergievskaya-data;
        try_files $uri @bundled_vk;
        expires 7d;
        add_header Cache-Control "public";
    }

    location @bundled_vk {
        root /var/www/sergievskaya;
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

